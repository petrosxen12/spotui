name: TUI Review

on:
  pull_request:
    paths:
      - "internal/ui/**"
      - "cmd/spotui-qareview/**"
      - "review/prompts/tui-review-*"
      - "review/tui_review.py"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  tui-review:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      TUI_REVIEW_DIR: .tmp/tui-review
      OPENAI_MODEL: gpt-4.1
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SVG rasterizer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Run targeted tests
        run: go test ./internal/ui ./cmd/spotui-qareview

      - name: Generate TUI review bundle
        run: go run ./cmd/spotui-qareview --out "$TUI_REVIEW_DIR"

      - name: Run OpenAI TUI review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY is not configured." >&2
            exit 1
          fi
          python review/tui_review.py \
            --bundle "$TUI_REVIEW_DIR" \
            --prompt-set review/prompts/tui-review-prompt-set.json \
            --out "$TUI_REVIEW_DIR" \
            --write-summary \
            --require-rasterizer

      - name: Publish sticky PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ steps.review.outputs.comment_path }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- spotui-tui-review:start -->';
            const body = fs.readFileSync(process.env.COMMENT_PATH, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload review outputs
        uses: actions/upload-artifact@v4
        with:
          name: tui-review-output
          path: |
            ${{ env.TUI_REVIEW_DIR }}/manifest.json
            ${{ env.TUI_REVIEW_DIR }}/review-brief.md
            ${{ env.TUI_REVIEW_DIR }}/*.txt
            ${{ env.TUI_REVIEW_DIR }}/*.svg
            ${{ env.TUI_REVIEW_DIR }}/*.png
            ${{ steps.review.outputs.report_path }}
            ${{ steps.review.outputs.summary_path }}
            ${{ steps.review.outputs.comment_path }}

      - name: Fail on blocker findings
        if: steps.review.outputs.ci_status != 'pass'
        run: |
          echo "TUI review reported blocker findings or requested another pass." >&2
          exit 1

  tui-review-fork-note:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Skip review for forked PRs
        run: echo "Skipping TUI review because OPENAI_API_KEY is not exposed to forked pull requests."
