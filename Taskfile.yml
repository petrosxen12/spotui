version: "3"

vars:
  BINARY: spotui

tasks:
  default:
    desc: Build the spotui binary
    cmds:
      - task: build

  build:
    desc: Build the spotui binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/spotui

  run:
    desc: Run the CLI entrypoint
    deps: [build]
    cmds:
      - ./{{.BINARY}}

  tui:
    desc: Launch the Bubble Tea TUI
    deps: [build]
    cmds:
      - ./{{.BINARY}} tui

  fmt:
    desc: Format Go source files
    cmds:
      - gofmt -w ./cmd ./internal

  check:
    desc: Verify the project builds
    cmds:
      - go build ./...

  qa:tui-review:
    desc: Generate multi-layout TUI QA review assets for AI/manual review
    cmds:
      - go run ./cmd/spotui-qareview --out ./docs/qa/tui-review

  qa:eval:
    desc: Run TUI review eval against committed fixture bundle-001 (requires OPENAI_API_KEY)
    cmds:
      - python review/tui_review.py --bundle review/evals/fixtures/bundle-001 --prompt-set review/prompts/tui-review-prompt-set.json --out review/evals/results/bundle-001 --write-summary
