<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#2C313C"/>
  <line x1="0" y1="3.5" x2="1600" y2="3.5" stroke="#49505C"/>

  <text x="28" y="38" fill="#8E9793" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">spotui  ·  ● idle  ·</text>
  <text x="205" y="38" fill="#1DB954" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">● Petros Xen</text>
  <text x="28" y="68" fill="#F6F8F7" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="19" font-weight="700">Nothing playing</text>
  <line x1="1245" y1="56.5" x2="1495" y2="56.5" stroke="#7F8884"/>
  <text x="1515" y="62" fill="#8E9793" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">0:00 / 0:00</text>
  <text x="28" y="138" fill="#C7CECA" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">Run /local start to use the local player.</text>
  <text x="28" y="162" fill="#707874" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">Local player: stopped</text>
  <text x="28" y="186" fill="#707874" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">tab focus  ·  enter play  ·  / commands  ·  q quit</text>
  <line x1="24" y1="236.5" x2="1576" y2="236.5" stroke="#2C9D63"/>
  <text x="28" y="262" fill="#C7CECA" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">›</text>
  <text x="45" y="262" fill="#707874" font-family="SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">Search tracks, playlists, or enter /pause /resume /next /prev /local start</text>

  <rect x="314" y="18" width="248" height="82" rx="12" fill="#F3C969"/>
  <text x="330" y="44" fill="#111513" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Status row owns identity</text>
  <text x="330" y="66" fill="#111513" font-family="system-ui, sans-serif" font-size="14">Connection moved out of the footer</text>
  <text x="330" y="84" fill="#111513" font-family="system-ui, sans-serif" font-size="14">so passive status stays quieter.</text>
  <line x1="314" y1="54" x2="262" y2="42" stroke="#F3C969" stroke-width="2"/>

  <rect x="346" y="120" width="288" height="84" rx="12" fill="#F3C969"/>
  <text x="362" y="146" fill="#111513" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Idle state is intentionally quiet</text>
  <text x="362" y="168" fill="#111513" font-family="system-ui, sans-serif" font-size="14">Repeated “Search” copy was removed</text>
  <text x="362" y="186" fill="#111513" font-family="system-ui, sans-serif" font-size="14">from the center of the screen.</text>
  <line x1="346" y1="162" x2="230" y2="148" stroke="#F3C969" stroke-width="2"/>

  <rect x="370" y="430" width="282" height="82" rx="12" fill="#F3C969"/>
  <text x="386" y="456" fill="#111513" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Single search invitation</text>
  <text x="386" y="478" fill="#111513" font-family="system-ui, sans-serif" font-size="14">The input placeholder is now the</text>
  <text x="386" y="496" fill="#111513" font-family="system-ui, sans-serif" font-size="14">only persistent search prompt.</text>
  <line x1="370" y1="470" x2="250" y2="254" stroke="#F3C969" stroke-width="2"/>
</svg>
